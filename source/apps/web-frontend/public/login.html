<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Global Logistics Mesh</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<div class="login-card">
  <h1>Global Logistics Mesh</h1>
  <div class="subtitle">Sign in to the supply chain management system</div>
  <div class="error" id="loginError"></div>
  <div id="loginForm">
    <div class="form-group"><label>Username</label><input id="loginUsername" placeholder="admin" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input id="loginPassword" type="password" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div class="switch">Don't have an account? <a onclick="showRegister()">Register</a></div>
  </div>
  <div id="registerForm" style="display:none">
    <div class="form-group"><label>Username</label><input id="regUsername" placeholder="Choose a username"></div>
    <div class="form-group"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input id="regPassword" type="password" placeholder="At least 6 characters"></div>
    <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    <div class="switch">Already have an account? <a onclick="showLogin()">Sign In</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/app.js"></script>
<script>
function showError(msg) { const el = document.getElementById('loginError'); el.textContent = msg; el.classList.add('show'); }
function clearError() { document.getElementById('loginError').classList.remove('show'); }
function showRegister() { clearError(); document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }
function showLogin() { clearError(); document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; }

async function doLogin() {
  clearError();
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) { showError('Please fill in all fields'); return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) { const e = await res.json(); showError(e.error || 'Login failed'); return; }
    const data = await res.json();
    APP.setAuth(data.token, data.user);
    location.href = '/';
  } catch(e) { showError(e.message); }
}

async function doRegister() {
  clearError();
  const username = document.getElementById('regUsername').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  if (!username || !email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    if (!res.ok) { const e = await res.json(); showError(e.error || 'Registration failed'); return; }
    const data = await res.json();
    APP.setAuth(data.token, data.user);
    location.href = '/';
  } catch(e) { showError(e.message); }
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
<div id="toast-container"></div>
</body>
</html>
