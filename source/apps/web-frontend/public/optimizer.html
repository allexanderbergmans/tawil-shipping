<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Optimizer — Global Logistics Mesh</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="sidebar-overlay"></div>
<div class="mobile-header">
  <button class="hamburger" id="hamburger">☰</button>
  <span class="title">GLM</span>
</div>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>Global Logistics &amp; Supply Chain Mesh</h1>
    <div class="sub">Bir Tawil Logistics Authority</div>
    <button class="sidebar-toggle">✕</button>
  </div>
  <nav class="sidebar-nav" data-search-group="Navigation">
    <a data-search="true" href="/">Dashboard</a>
    <a data-search="true" href="/shipments.html">Shipments</a>
    <a data-search="true" href="/compliance.html">Compliance</a>
    <a data-search="true" href="/documents.html">Documents</a>
    <a data-search="true" href="/notifications.html">Notifications</a>
    <a data-search="true" href="/network.html">Network</a>
    <a data-search="true" href="/slas.html">SLAs</a>
    <a data-search="true" href="/audit.html">Audit Log</a>
    <a data-search="true" href="/risk.html">Risk</a>
    <a data-search="true" href="/lanes.html">Trade Lanes</a>
  </nav>
</div>
<div class="main" id="app">
  <div class="page-header">
    <h2>Route Optimizer</h2>
    <div style="display:flex;gap:8px"><span class="ws-status disconnected" id="wsStatus">Disconnected</span><button class="sound-toggle" id="soundToggle" onclick="APP.toggleSound(); this.classList.toggle('muted', !APP.soundEnabled); this.textContent = APP.soundEnabled ? '🔊 Sound' : '🔇 Muted'">🔊 Sound</button></div>
  </div>

  <div class="card">
    <div class="card-header">Find Optimal Routes</div>
    <div style="padding:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label style="font-size:12px;color:var(--gray-500)">Origin</label><input id="origin" class="form-input" placeholder="e.g. Ningbo" style="width:100%;padding:8px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px"></div>
        <div><label style="font-size:12px;color:var(--gray-500)">Destination</label><input id="destination" class="form-input" placeholder="e.g. Rotterdam" style="width:100%;padding:8px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px"></div>
      </div>
      <div style="display:flex;gap:12px;align-items:end;margin-bottom:12px">
        <div style="flex:1"><label style="font-size:12px;color:var(--gray-500)">Cargo Weight (kg)</label><input id="weight" type="number" value="1000" class="form-input" style="width:100%;padding:8px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px"></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--gray-500)">Prioritize</label><select id="priority" class="form-input" style="width:100%;padding:8px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px"><option value="balanced">Balanced</option><option value="cost">Lowest Cost</option><option value="time">Fastest</option><option value="eco">Greenest</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="searchRoutes()" style="width:100%;padding:10px;font-size:15px">Search Routes</button>
    </div>
  </div>

  <div id="results" style="display:none;margin-top:20px">
    <div class="card">
      <div class="card-header">Route Comparison</div>
      <div id="routeTable"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-header">Carbon &amp; Cost Analysis</div>
      <div id="carbonAnalysis"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-header">Available Lanes</div>
      <div id="availableLanes"></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/app.js?v=2"></script>
<script>
APP.checkAuth().then(() => { APP.renderNav(); });

async function searchRoutes() {
  const origin = document.getElementById('origin').value.trim();
  const dest = document.getElementById('destination').value.trim();
  const weight = parseFloat(document.getElementById('weight').value) || 1000;
  const priority = document.getElementById('priority').value;
  if (!origin || !dest) { APP.toast("Enter origin and destination", "", "warning"); return; }

  APP.toast("Searching routes...", origin + " → " + dest, "info");

  // Fetch routes and lanes in parallel
  const [routes, lanes] = await Promise.all([
    APP.findRoutes(origin, dest, weight),
    APP.api("/api/optimize/lanes").catch(() => [])
  ]);

  // Filter and enhance routes by priority
  let sorted = [...routes];
  if (priority === "cost") sorted.sort((a, b) => (a.total_cost || a.totalCost || 0) - (b.total_cost || b.totalCost || 0));
  else if (priority === "time") sorted.sort((a, b) => (a.transit_days || a.transitDays || 999) - (b.transit_days || b.transitDays || 999));
  else if (priority === "eco") sorted.sort((a, b) => (a.total_co2 || a.totalCO2 || 0) - (b.total_co2 || b.totalCO2 || 0));
  else sorted.sort((a, b) => ((a.total_cost || a.totalCost || 0) * 0.4 + (a.transit_days || a.transitDays || 30) * 0.3 + (a.total_co2 || a.totalCO2 || 0) * 100 * 0.3) - ((b.total_cost || b.totalCost || 0) * 0.4 + (b.transit_days || b.transitDays || 30) * 0.3 + (b.total_co2 || b.totalCO2 || 0) * 100 * 0.3));

  APP.renderRouteComparison('routeTable', sorted);

  // Carbon analysis for each mode
  const modes = ["sea", "air", "road", "rail"];
  let carbHtml = '<div style="padding:8px;font-size:13px">';
  carbHtml += '<table class="table"><thead><tr><th>Mode</th><th>Distance</th><th>CO₂</th><th>Offset Cost</th><th>Car Equivalent</th></tr></thead><tbody>';
  modes.forEach(m => {
    const est = APP.carbonEstimate(origin, dest, weight, m);
    carbHtml += '<tr><td><strong>' + m.toUpperCase() + '</strong></td><td>' + est.distanceKm.toLocaleString() + ' km</td><td>' + est.co2Kg.toLocaleString() + ' kg</td><td>' + APP.formatCurrency(est.offsetCost) + '</td><td>' + est.equivalentKmDriven.toLocaleString() + ' km</td></tr>';
  });
  carbHtml += '</tbody></table></div>';
  document.getElementById('carbonAnalysis').innerHTML = carbHtml;

  // Available lanes
  if (lanes && lanes.length) {
    const matched = lanes.filter(l => l.origin && l.destination);
    document.getElementById('availableLanes').innerHTML = '<div style="padding:8px;font-size:12px">' + matched.map(l => '<span class="badge gray" style="margin:0 4px 4px 0">' + l.origin + ' → ' + l.destination + '</span>').join('') + '</div>';
  }

  document.getElementById('results').style.display = 'block';
}
</script>
<div id="toast-container"></div>
</body>
</html>
